name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Pint · Larastan · migrate · Pest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pit_launchpad
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pdo_sqlite, mbstring, bcmath, intl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

      - name: Migrate + seed (PostgreSQL)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: pit_launchpad
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan migrate:fresh --seed

      - name: Tests (Pest, in-memory SQLite)
        run: php artisan test
